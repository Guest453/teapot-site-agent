<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="A tiny website maintained by a Discord-powered site agent." />
    <title>Cesus the Teapot</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="birdvirus">
    <main>
      <p class="eyebrow">cesustheteapot.dpdns.org</p>
      <h1 class="glitch">The teapot is warming up.</h1>
      <p class="intro">This little corner of the web can evolve from a Discord command.</p>
      
      <div class="game-container">
        <div id="score-display">birds: 0</div>
        <div class="teapot" id="clicker" aria-hidden="true">🐦</div>
        <div class="flowey" id="flowey" aria-hidden="true">🌻</div>
        <div id="dominoes-text" style="display:none; font-size: 1.5rem; color: #f0f; margin-top: 1rem;">MARIO 64: THE THOUSAND-YEAR DOMINOES</div>
      </div>
    </main>
    <script>
      let count = 0;
      const scoreDisplay = document.getElementById('score-display');
      const clicker = document.getElementById('clicker');
      const flowey = document.getElementById('flowey');
      const dominoesText = document.getElementById('dominoes-text');
      
      clicker.addEventListener('click', () => {
        count++;
        scoreDisplay.innerText = `birds: ${count}`;
        
        // little juice effect
        clicker.style.transform = 'scale(1.2)';
        setTimeout(() => {
          clicker.style.transform = 'scale(1)';
        }, 50);

        // flowey reaction
        if (count % 10 === 0) {
          flowey.style.transform = 'scale(1.5) rotate(20deg)';
          setTimeout(() => {
            flowey.style.transform = 'scale(1) rotate(0deg)';
          }, 200);
        }

        // the dominoes trigger
        if (count === 64) {
          dominoesText.style.display = 'block';
          document.body.style.animation = 'shake 0.05s infinite';
        }
      });
    </script>
  </body>
</html>
