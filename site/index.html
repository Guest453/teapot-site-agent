<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="A tiny website maintained by a Discord-powered site agent." />
    <title>Cesus the Teapot</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="birdvirus">
    <main>
      <p class="eyebrow">cesustheteapot.dpdns.org</p>
      <h1 class="glitch">The teapot is warming up.</h1>
      <p class="intro">This little corner of the web can evolve from a Discord command.</p>
      
      <div class="game-container">
        <div id="score-display">birds: 0</div>
        <div class="teapot" id="clicker" aria-hidden="true">🐦</div>
      </div>
    </main>
    <script>
      let count = 0;
      const scoreDisplay = document.getElementById('score-display');
      const clicker = document.getElementById('clicker');
      
      clicker.addEventListener('click', () => {
        count++;
        scoreDisplay.innerText = `birds: ${count}`;
        
        // little juice effect
        clicker.style.transform = 'scale(1.2)';
        setTimeout(() => {
          clicker.style.transform = 'scale(1)';
        }, 50);
      });
    </script>
  </body>
</html>
